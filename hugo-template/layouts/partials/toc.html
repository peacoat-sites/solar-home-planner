{{/* Table of Contents — only renders when article has 2+ headings */}}
{{ $toc := .TableOfContents }}
{{ if and $toc (gt (len $toc) 150) }}
<div class="toc-widget">
  <div class="toc-header">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    In This Article
  </div>
  <nav class="toc-nav" id="article-toc" aria-label="Table of contents">
    {{ $toc }}
  </nav>
  <div class="toc-progress-bar"><div class="toc-progress-fill" id="toc-progress"></div></div>
</div>
{{ end }}
