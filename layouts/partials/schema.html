{{- if .IsHome -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebSite",
      "@id": "{{ .Site.BaseURL }}#website",
      "url": "{{ .Site.BaseURL }}",
      "name": {{ .Site.Title | jsonify }},
      "description": {{ .Site.Params.description | jsonify }},
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "{{ .Site.BaseURL }}search/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    },
    {
      "@type": "Organization",
      "@id": "{{ .Site.BaseURL }}#organization",
      "url": "{{ .Site.BaseURL }}",
      "name": {{ .Site.Title | jsonify }},
      "description": {{ .Site.Params.description | jsonify }}
    }
  ]
}
</script>
{{- else if .IsPage -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Article",
      "@id": "{{ .Permalink }}#article",
      "url": "{{ .Permalink }}",
      "headline": {{ .Title | jsonify }},
      "description": {{ if .Description }}{{ .Description | jsonify }}{{ else }}{{ .Site.Params.description | jsonify }}{{ end }},
      "datePublished": "{{ .PublishDate.Format "2006-01-02T15:04:05Z07:00" }}",
      "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
      "author": {
        "@type": "Organization",
        "@id": "{{ .Site.BaseURL }}#organization",
        "name": {{ with .Params.author }}{{ . | jsonify }}{{ else }}{{ .Site.Params.author | jsonify }}{{ end }}
      },
      "publisher": {
        "@type": "Organization",
        "@id": "{{ .Site.BaseURL }}#organization",
        "name": {{ .Site.Title | jsonify }}
      },
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{ .Permalink }}"
      },
      "isPartOf": { "@id": "{{ .Site.BaseURL }}#website" }{{ if .Params.image }},
      "image": {{ .Params.image | jsonify }}{{ end }}
    },
    {
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "{{ .Site.BaseURL }}" }{{ if .Params.categories }},
        { "@type": "ListItem", "position": 2, "name": {{ index .Params.categories 0 | title | jsonify }}, "item": "{{ .Site.BaseURL }}categories/{{ index .Params.categories 0 | anchorize }}/" },
        { "@type": "ListItem", "position": 3, "name": {{ .Title | jsonify }}, "item": "{{ .Permalink }}" }{{ else }},
        { "@type": "ListItem", "position": 2, "name": {{ .Title | jsonify }}, "item": "{{ .Permalink }}" }{{ end }}
      ]
    }
  ]
}
</script>
{{- if .Params.faq }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {{ range $i, $faq := .Params.faq }}{{ if $i }},{{ end }}
    {
      "@type": "Question",
      "name": {{ $faq.question | jsonify }},
      "acceptedAnswer": {
        "@type": "Answer",
        "text": {{ $faq.answer | jsonify }}
      }
    }
    {{ end }}
  ]
}
</script>
{{- end }}
{{- end -}}
