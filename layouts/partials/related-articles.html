{{ $currentPage := . }}
{{ $related := where .Site.RegularPages "Type" "posts" }}
{{ $related = where $related "Permalink" "ne" $currentPage.Permalink }}
{{ $related = first 3 $related }}
{{ with $related }}
<section class="related-articles-inline">
  <h3>Related Articles</h3>
  <ul>
    {{ range . }}
    <li>
      <a href="{{ .Permalink }}">{{ .Title }}</a>
    </li>
    {{ end }}
  </ul>
</section>
{{ end }}
