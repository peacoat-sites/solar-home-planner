{{ define "main" }}
<div style="max-width:600px;margin:80px auto;text-align:center;padding:0 24px">
  <h1 style="font-size:96px;font-weight:800;color:var(--accent);margin:0;line-height:1;font-family:var(--serif);letter-spacing:-4px">404</h1>
  <h2 style="font-size:22px;margin:20px 0 12px;color:var(--text);font-family:var(--serif)">Page Not Found</h2>
  <p style="color:var(--muted);font-size:15px;line-height:1.7;margin-bottom:36px;max-width:420px;margin-left:auto;margin-right:auto">
    That page doesn't exist or may have moved. Try heading back home or use the search bar to find what you're looking for.
  </p>
  <a href="/" style="display:inline-block;background:var(--accent);color:#0b0b0f;padding:13px 32px;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px;letter-spacing:0.02em;transition:filter .2s">← Back to Home</a>
</div>
{{ end }}
