{{ define "main" }}
<div class="page-wrap">
  <article class="page-main">
    {{ if not (eq (.Params.hide_title | default false) true) }}
    <header class="page-header">
      <h1 class="page-title">{{ .Title }}</h1>
      {{ if .Params.subtitle }}<p class="page-subtitle">{{ .Params.subtitle }}</p>{{ end }}
    </header>
    {{ end }}
    <div class="post-content page-content">
      {{ .Content }}
    </div>
  </article>
</div>
{{ end }}
