name: Image Health Check

# Scans articles for empty or dead (404) hero images and auto-retrofits them
# with a fresh Pexels image. Self-healing — keeps every article's imagery valid.
on:
  schedule:
    - cron: '17 */6 * * *'   # every 6 hours
  workflow_dispatch:
jobs:
  image-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PIPELINE_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Scan + retrofit broken images
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python pipeline/image_health.py
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts || true
          git diff --staged --quiet || git commit -m "fix: auto-retrofit broken hero images (image health)"
          git pull --rebase origin main
          git push