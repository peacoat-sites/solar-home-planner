name: Refresh Solar Data
on:
  schedule:
    - cron: '0 7 1 1,4,7,10 *'   # quarterly
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PIPELINE_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch NREL solar data
        env:
          NREL_API_KEY: ${{ secrets.NREL_API_KEY }}
        run: python pipeline/fetch_solar.py data/solar_states.json
      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/solar_states.json || true
          git diff --staged --quiet || git commit -m "chore: refresh solar data from NREL"
          git push || true
