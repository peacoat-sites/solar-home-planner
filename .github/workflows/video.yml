name: Publish YouTube Videos

# Publishes one YouTube Short (9:16) + one Standard video (16:9) per run.
# Schedule: Mon / Wed / Fri at 11:00 UTC (after articles go live at 09:17 UTC)
# Each site repo has ELEVENLABS_VOICE_ID and YOUTUBE_CHANNEL_ID set as GitHub variables.

on:
  schedule:
    - cron: '0 11 * * 1,3,5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (script + audio only, no render/upload)'
        required: false
        default: 'false'
        type: boolean

jobs:
  video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PIPELINE_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Generate and publish videos
        run: python pipeline/video_single.py ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        env:
          # ── AI + Media ──────────────────────────────────────────────
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY:     ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID:    ${{ vars.ELEVENLABS_VOICE_ID }}
          SHOTSTACK_API_KEY:      ${{ secrets.SHOTSTACK_API_KEY }}
          SHOTSTACK_ENV:          production
          PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
          # ── Google / YouTube ─────────────────────────────────────────
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          YOUTUBE_CHANNEL_ID:     ${{ vars.YOUTUBE_CHANNEL_ID }}
          # ── Site identity ─────────────────────────────────────────────
          SITE_NAME:              ${{ vars.SITE_NAME }}
          SITE_DOMAIN:            ${{ vars.SITE_DOMAIN }}
          SITE_NICHE:             ${{ vars.SITE_NICHE }}
          # ── Git auth ─────────────────────────────────────────────────
          PIPELINE_TOKEN:         ${{ secrets.PIPELINE_TOKEN }}

      - name: Upload dry-run artifacts
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: dry-run-${{ vars.SITE_NAME }}
          path: |
            narration.mp3
            script.json
          retention-days: 3
