googleAnalytics = "G-QE837372GZ"
baseURL = "https://solarhomeplanner.com/"
enableGitInfo = true
languageCode = "en-us"
title = "Solar Home Planner"
[pagination]
  pagerSize = 12
enableRobotsTXT = true
enableEmoji = true

[params]
author = "Stephen Brenish"
  description = "Plan your home solar system the right way — contractor selection, permits, home types, off-grid, EV charging, and maintenance guides all in one place."
  niche = "Residential Solar & Home Energy"
  adsense_id = "ca-pub-3466203197759215"
  adsense_slot_header = "auto"
  adsense_slot_incontent = "auto"
  adsense_slot_sidebar = "auto"
  image_query = "solar panels house installation roof"
  author = "Solar Home Planner Editorial Team"
  logo_text = "Solar Home Planner"
  tagline = "The Complete Guide to Going Solar."
  primary_color = "#1b4f72"
  cloudflare_analytics = ""

  # Authority theme
  hero_color_1 = "#022c22"
  hero_color_2 = "#065f46"
  hero_color_3 = "#0d9488"
  hero_color_4 = "#0f172a"
  monthly_readers = 29000
  research_hours  = 260
  satisfaction    = 95
  trust_extra     = "Independent solar research"
  impact_verification = ""
  impact_tracking_id  = "" 

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  priority = 0.5
  filename = "sitemap.xml"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 3
    ordered    = false

[permalinks]
  posts = "/:slug/"

[related]
  includeNewer = true
  threshold    = 80
  toLower      = false
  [[related.indices]]
    name   = "keywords"
    weight = 100
  [[related.indices]]
    name   = "tags"
    weight = 80
  [[related.indices]]
    name   = "categories"
    weight = 50