baseURL = "https://solarhomeplanner.com/"
enableGitInfo = true
languageCode = "en-us"
title = "Solar Home Planner"
[pagination]
  pagerSize = 12
enableRobotsTXT = true
enableEmoji = true

[params]
  description = "Plan your home solar system the right way — contractor selection, permits, home types, off-grid, EV charging, and maintenance guides all in one place."
  niche = "Residential Solar & Home Energy"
  adsense_id = "ca-pub-3466203197759215"
  adsense_slot_header = "auto"
  adsense_slot_incontent = "auto"
  adsense_slot_sidebar = "auto"
  image_query = "solar panels house installation roof"
  author = "Solar Home Planner Editorial Team"
  logo_text = "Solar Home Planner"
  tagline = "The Complete Guide to Going Solar."
  cloudflare_analytics = ""

  # Authority theme
  monthly_readers = 29000
  research_hours  = 260
  satisfaction    = 95
  trust_extra     = "Independent solar research"
  impact_verification = ""
  impact_tracking_id  = ""
  persona_name       = "Liz & Tom Greer"
  persona_title      = "Home Solar Writers"
  persona_bio        = "Liz and Tom Greer installed a 9.2kW rooftop solar system on their home in 2021. After going through the full process — design, quotes, permitting, installation, and utility interconnection — they started writing guides to help other homeowners plan their solar projects realistically, based on what they actually experienced."
  persona_initials   = "LG"
  disclaimer         = "This site shares personal experience and general research about residential solar. System performance, costs, and incentives vary by location, home, and utility. This is not professional installation advice. Consult a licensed solar installer for a system design and quote specific to your home."

logo_text_1 = "Solar"
logo_text_2 = "Home Planner"
primary_color = "#0d6b63"
hero_color_1 = "#0d0600"
hero_color_2 = "#1a0e00"
hero_color_3 = "#fb923c"
hero_color_4 = "#080400"
[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  priority = 0.5
  filename = "sitemap.xml"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 3
    ordered    = false

[permalinks]
  posts = "/:slug/"

[related]
  includeNewer = true
  threshold    = 80
  toLower      = false
  [[related.indices]]
    name   = "keywords"
    weight = 100
  [[related.indices]]
    name   = "tags"
    weight = 80
  [[related.indices]]
    name   = "categories"
    weight = 50

[services]
  [services.googleAnalytics]
    id = "G-QE837372GZ"
